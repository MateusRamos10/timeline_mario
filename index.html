<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=yes, initial-scale=1.0, maximum-scale=10.0">
    <meta name="keywords" content="timeline, mario">
    <meta name="description" content="Minha timeline, no estilo do Super Mario">
    <meta name="author" content="Mateus Ramos">
    <meta name="color-scheme" content="light">
    <title>Super Mateus Timeline</title>
    <link rel="preload" href="https://fonts.googleapis.com/css?family=Press+Start+2P" as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Press+Start+2P">
    </noscript>
    <style>
        :root {
            --color-primary: #ffffff;
            --color-secondary: #c00;
            --color-white: #0a0a0a;
            --color-white-2: #fff;
            --color-grey-1: #6c7983;
            --color-grey-4: #b2becd;
            --color-blue: #036187;
            --color-sky: #b1d9f9;
            --color-yellow: #fbd000;
            --color-red: #e52521;
            --color-opposite: #edad19;
        }

        html,
        body,
        div,
        span,
        h1,
        h2,
        h3,
        p,
        ul,
        li,
        header {
            margin: 0;
            padding: 0;
            border: 0;
            font-size: 100%;
            font: inherit;
            vertical-align: baseline;
        }

        * {
            box-sizing: border-box;
            list-style: none;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: var(--color-sky);
            color: var(--color-grey-1);
            line-height: 1;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .stage {
            position: relative;
            flex: 1;
        }

        .stage header {
            max-width: 540px;
            width: 100%;
            margin: 64px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            position: relative;
        }

        .stage header h1,
        .stage header h2 {
            color: var(--color-white);
            font-family: 'Press Start 2P', sans-serif;
            text-align: center;
        }

        .stage header h1 {
            text-transform: uppercase;
            font-size: 64px;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0 rgba(0, 0, 0, 0.5);
        }

        .stage header h2 {
            font-size: 16px;
            line-height: 20px;
            margin-bottom: 10px;
        }

        .stage header .info {
            font-family: 'Press Start 2P', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--color-blue);
        }

        @media screen and (max-width: 639px) {
            .stage header {
                max-width: 400px;
            }

            .stage header h1 {
                font-size: 48px;
            }

            .stage header h2 {
                font-size: 12px;
                line-height: 16px;
            }
        }

        @media screen and (max-width: 399px) {
            .stage header {
                max-width: 300px;
            }

            .stage header h1 {
                font-size: 32px;
            }

            .stage header h2 {
                font-size: 11px;
                line-height: 14px;
            }
        }

        /* EVENTS */
        #events {
            position: absolute;
            bottom: 0;
            height: 120px;
            left: 50vw;
            display: flex;
            justify-content: flex-start;
            align-items: flex-end;
            z-index: 20;
            /* Adicione apenas esta linha */
        }

        .event {
            flex: 0 0 50px;
            min-width: 0;
            position: relative;
            cursor: pointer;
        }

        .event .tube-img {
            width: 80px;
            height: 78px;
            image-rendering: pixelated;
            object-fit: contain;
            display: block;
            margin-top: -15px;
            margin-left: -15px;
            position: relative;
            top: 15px;
            /* Ajuste este valor para mover apenas o tubo para baixo */
        }

        /* Sprites especiais */
        .event .sprite-img {
            image-rendering: pixelated;
            display: block;
        }

        .event .sprite-block {
            width: 32px;
            height: 32px;
            margin-left: 09px;
            position: relative;
            top: -80px;
        }

        .event.event-block .label {
            bottom: calc(100% + 78px);
        }

        .event.event-block .balloon {
            bottom: calc(100% + 88px);
        }

        .event .sprite-peach {
            width: 64px;
            height: 64px;
            margin-left: -7px;
            transition: transform 0.3s;
        }

        .event .sprite-enemy {
            width: 48px;
            height: 48px;
            margin-left: 1px;
        }

        .event .sprite-star {
            width: 48px;
            height: 48px;
            margin-left: 1px;
            position: relative;
            top: -40px;
        }

        .event.event-star .label {
            bottom: calc(100% + 40px);
        }

        .event.event-star .balloon {
            bottom: calc(100% + 70px);
        }

        .event .sprite-yoshi {
            width: 80px;
            height: 80px;
            margin-left: -15px;
            position: relative;
            top: 10px;
        }

        /* Rotulo mes/ano (duas linhas) */
        .event .label {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Press Start 2P', sans-serif;
            font-size: 7px;
            color: var(--color-white);
            text-align: center;
            padding-bottom: 8px;
            opacity: 0.8;
            line-height: 1.8;
            pointer-events: none;
            white-space: nowrap;
        }

        /* Balao com frase */
        .event .balloon {
            position: absolute;
            bottom: calc(100% + 30px);
            left: 50%;
            transform: translateX(-50%) translateY(20px) scale(0.9);
            width: 320px;
            background: var(--color-white-2);
            padding: 18px;
            border: 3px solid var(--color-white);
            text-align: center;
            font-family: 'Press Start 2P', sans-serif;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 20;
        }

        .event .balloon::after {
            content: '';
            position: absolute;
            bottom: -14px;
            left: 50%;
            margin-left: -14px;
            border-width: 14px 14px 0;
            border-style: solid;
            border-color: var(--color-white-2) transparent transparent transparent;
        }

        .event .balloon::before {
            content: '';
            position: absolute;
            bottom: -19px;
            left: 50%;
            margin-left: -17px;
            border-width: 17px 17px 0;
            border-style: solid;
            border-color: var(--color-white) transparent transparent transparent;
        }

        .event .balloon p {
            font-size: 10px;
            color: var(--color-grey-1);
            line-height: 2;
        }

        .event.active .balloon {
            opacity: 1;
            transform: translateX(-50%) translateY(0) scale(1);
        }

        /* GROUND */
        .ground {
            position: relative;
            flex: 0 0 30vh;
            margin-top: auto;
            background-color: brown;
            background-position: 0 32px;
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAABlBMVEXcuUXCjk1OwG03AAAAOklEQVR42s3KMQ4AIAjF0Hr/S8vWUQxE7PTz81iHbgBRF4AJ4FUHBnlgPcDmAVEeEP0F3DlgdWBPwQZbaQOVh0uGXAAAAABJRU5ErkJggg==");
        }

        .ground .grass {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 32px;
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAAElBMVEXcuUUAbT1tXRIAwgAAAADCjk0qQzGwAAAAVElEQVR42s3KgQbAMAyE4V52ef9X3sSqO3Ch1H6QnG/Q5MFlOgEAHVCt2wNSB1bAvD2I0CEqct4e6KD1QOb3zbf1NYBpB4ynPqjnV0BuD7R9oJ0BNy2lDrH5TF/VAAAAAElFTkSuQmCC");
        }

        /* MARIO */
        .mario {
            position: absolute;
            width: 32px;
            height: 48px;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%) scaleX(1);
            transform-origin: center bottom;
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQAAAAAwCAMAAADJoVRNAAAAKlBMVEX ///8AAAAgMIhAgJhQAACA2MiIWBiwKGDYoDj4QHD4cGj40MD42HD4+PiXA2ldAAAAAXRSTlMAQObYZgAAAyVJREFUeNrtl41uEzEQhHHaLCn1vf/r4sknM8Z3wg6iEpJ2pFyCv/0dkd7l279QKpVKpVLRtB+XBvxvev+lv+MRn01arTw1c04d9xVTzGzN0wCjj49aP55yyD6P+NHEaqzqKBpzyvqKjbgaT/Xp5OwVNxWB/Sl75mkA+DhqfTy+NxGyy22AhAGIKMzjBAOInA1gPNV/PGo9DnJ3OVQzasp5Qrg18zSgDFILNXLAPpcBsuLKADgG9PhxQFVVbcgr3OaMMzKh+SzzNKCc5AKvc63HlSaMPp6P8npe7nVui619A9IApNH6S/r8JGDN+ZcE4c/cyYAmR0jjAp24C2SPR1D/92uEuWYYJTvN04BoUgteStYfM6+44n0lca5XBnTmWK8XQZa7RNMe77Odr47gS+T1NVkaAKXAqNLE7YwFV3yOKGgyAI1xXpDbo7kjdrgmMfMMyrJBTIL02QalASrQpWP/R2fBFR9jaM+7GvWbmE/Pj8IaRqzXhhOz5v6KmvA1gdogzYv8WJYGoGL5NtYEXXMb4J9EfEX8XzhCefPwru/bpLXLvSTycjbIDEUQkQYgJ0okQGaOOrdYGWHS+CjK8J27ueuP2WjiTWduiZ7Xt2aDTNKArtstAs0/FMwdEXHm701vTcpXBYubkJg+3W4miIpd5pbyr7h/7sDmDdz/3qTl73emSAPm8RWgEfuj4jWPgEe8kt8fRcUVN68QAY8wX+ebqqfOJU3hCXo289Um8dsNngZ4/OO4348mrSgZlybzCF31Xso63yPoTOspRpFawR1c1Vx99/IjtD6Ed1kQ4WzWt2RBGnBtgEfx+rWWMi4Ix4JVPrpacFyf83FBupayyodFzAZwagPenurLN00GpAEgKWI2QKsqwtwGrPJRP/MYZwPMRelayjqfVTWBZ7ABCNqv4s5PA5COQV5gtsDF1dAGOH/HACLNSqEaVPL6q3zEPDDeqXfeD835aYAH0QuN5xAVQTqrlbN1PuKUiHNerXN9G7DKdxWLiH2eBrCSXg6wPMp8ts6fByBqv/463yZiGp+us+GXE6YBk0zWWuV/fX2fW1s8DfgJOOWTbX4vpL0AAAAASUVORK5CYII=");
            background-repeat: no-repeat;
            image-rendering: pixelated;
            z-index: 30;
            background-position: -192px 0;
        }

        .mario.idle {
            animation: none;
            background-position: -192px 0;
        }

        .mario.walk {}

        .mario.facing-left {
            transform: translateX(-50%) scaleX(-1);
        }

        .mario.jumping {
            animation: marioJump 0.5s ease-out forwards !important;
        }

        .mario.dead {
            animation: marioDead 0.6s ease-out forwards !important;
        }

        .mario.star-power {
            animation: starPower 0.12s steps(1) infinite !important;
        }

        .mario.on-yoshi {
            margin-bottom: 45px;
        }

        @keyframes marioJump {
            0% {
                bottom: 0;
                background-position: -160px 0;
            }

            50% {
                bottom: 100px;
            }

            100% {
                bottom: 0;
                background-position: -192px 0;
            }
        }

        @keyframes marioDead {
            0% {
                bottom: 0;
                opacity: 1;
            }

            30% {
                bottom: 30px;
            }

            100% {
                bottom: -20px;
                opacity: 0.4;
                transform: translateX(-50%) scaleX(1) rotate(90deg);
            }
        }

        @keyframes starPower {
            0% {
                filter: hue-rotate(0deg) brightness(1.3);
            }

            25% {
                filter: hue-rotate(90deg) brightness(1.6);
            }

            50% {
                filter: hue-rotate(180deg) brightness(1.3);
            }

            75% {
                filter: hue-rotate(270deg) brightness(1.6);
            }
        }

        /* PLACAS FINAIS */
        .signs-wrapper {
            position: absolute;
            bottom: 0;
            left: 80px;
            display: flex;
            gap: 30px;
            align-items: flex-end;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .signs-wrapper.show {
            opacity: 1;
        }

        .sign-post {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sign-post .sign-board {
            background: var(--color-yellow);
            border: 3px solid #a85000;
            color: #000;
            padding: 12px 14px;
            font-family: 'Press Start 2P', sans-serif;
            font-size: 9px;
            text-align: center;
            border-radius: 6px;
            box-shadow: 3px 3px 0 #000;
            white-space: nowrap;
            line-height: 1.6;
        }

        .sign-post .sign-pole {
            width: 10px;
            height: 60px;
            background: #a85000;
            border: 2px solid #000;
            border-top: none;
            border-bottom: none;
        }

        .sign-post:nth-child(1) {
            margin-left: 200px;
            /* <--- Só adicionar essa linha e alterar! */
            position: relative;
            z-index: 4;
        }

        .sign-post:nth-child(2) {
            margin-left: -200px;
            /* Puxa para a esquerda (agrupa com a 1) */
            position: relative;
            z-index: 4;
        }

        .sign-post:nth-child(2) .sign-pole {
            height: 200px;
        }

        .sign-post:nth-child(3) {
            margin-left: -110px;
            /* Empurra levemente para a direita */
            position: relative;
            z-index: 4;
        }

        .sign-post:nth-child(3) .sign-pole {
            height: 120px;
        }

        .sign-post:nth-child(4) {
            /* aqui */
            margin-left: -100px;
            /* Puxa para a esquerda (agrupa com a 3) */
            position: relative;
            z-index: 1;
        }

        .sign-post:nth-child(4) .sign-pole {

        }

                <p id="info" class="info">(use o scroll do mouse!)</p>
            </header>
            <ul id="events"></ul>
            <div id="mario" class="mario idle"></div>
        </div>
        <div id="ground" class="ground">
            <div id="grass" class="grass"></div>
        </div>

    </div>

            { month: "MAIO", year: "2014", text: "Iniciei um novo trabalho em uma concession\u00e1ria de caminh\u00f5es", type: "tube", spacing: 200 },
            { month: "FEVEREIRO", year: "2015", text: "Iniciei meus estudos em Ci\u00eancia da Computa\u00e7\u00e3o na UNIP", type: "tube", spacing: 200 },
            { month: "OUTUBRO", year: "2019", text: "Precisei trancar o curso, sai do trabalho e decidi empreender", type: "block", spacing: 200 },
            { month: "NOVEMBRO", year: "2020", text: "Casei com minha Peach", type: "peach", spacing: 250 },
            { month: "AGOSTO", year: "2023", text: "Como seller na Amazon USA, n\u00e3o obtive o sucesso que esperei", type: "enemy", spacing: 250 },
            { month: "SETEMBRO", year: "2023", text: "Voltei a estudar Ci\u00eancia da Computa\u00e7\u00e3o na UNIP", type: "star", spacing: 200 },
            { month: "FEVEREIRO", year: "2024", text: "Entrei no Est\u00e1gio de An\u00e1lise de Dados", type: "tube", spacing: 200 },
            { month: "NOVEMBRO", year: "2024", text: "Efetivado como Analista de Dados J\u00fanior", type: "tube", spacing: 200 },
            { month: "SETEMBRO", year: "2025", text: "Reconhecido como Analista de Dados Pleno", type: "tube", spacing: 200 },
            { month: "JUNHO", year: "2026", text: "O estudo nunca para, ainda n\u00e3o \u00e9 a chegada", type: "yoshi", spacing: 200 },
        ];

        const eventsEl = document.getElementById('events');
        const mario = document.getElementById('mario');
        const ground = document.getElementById('ground');
        const grass = document.getElementById('grass');

        let scrollX = 0, maxScroll = 0, walkTimeout, lastScrollX = 0, starTimeout;

        // Build events
        let cumulativeLeft = 0;
        timeline.forEach((item, i) => {
            const li = document.createElement('li');
            li.className = 'event event-' + item.type;
            li.id = 'event-' + i;
            li.style.marginLeft = item.spacing + 'px';
            cumulativeLeft += item.spacing + 50;

            let visual = '';
            if (item.type === 'tube') {
                visual = '<img class="tube-img" src="' + TUBE_SRC + '" alt="tubo">';
            } else if (item.type === 'block') {
                visual = '<img class="sprite-img sprite-block" src="' + SPRITES.block + '" alt="?">';
            } else if (item.type === 'peach') {
                visual = '<img class="sprite-img sprite-peach" src="' + SPRITES.peach + '" alt="Peach">';
            } else if (item.type === 'enemy') {
                visual = '<img class="sprite-img sprite-enemy" src="' + SPRITES.enemy + '" alt="Goomba">';
            } else if (item.type === 'star') {
                visual = '<img class="sprite-img sprite-star" src="' + SPRITES.star + '" alt="Star">';
            } else if (item.type === 'yoshi') {
                visual = '<img class="sprite-img sprite-yoshi" src="' + SPRITES.yoshi + '" alt="Yoshi">';
            }

            // Label = two lines: MONTH then YEAR
            li.innerHTML =
                '<div class="label">' + item.month + '<br>' + item.year + '</div>' +
                '<div class="balloon"><p>' + item.text + '</p></div>' +
                visual;

            // Yoshi: add signs
            if (item.type === 'yoshi') {
                const signs = document.createElement('div');
                signs.className = 'signs-wrapper';
                signs.id = 'finale-signs';
                ['Marketing Analyst', 'Tech Lead', 'Growth Analyst', 'Product Analyst'].forEach(t => {
                    signs.innerHTML += '<div class="sign-post"><div class="sign-board">' + t + '</div><div class="sign-pole"></div></div>';
                });
                li.appendChild(signs);
            }

            eventsEl.appendChild(li);
        });

        maxScroll = cumulativeLeft - 25;

        /* SCROLL & ANIMATION */
        function updateWorld(delta) {
            lastScrollX = scrollX;
            scrollX += delta;
            if (scrollX < 0) scrollX = 0;
            if (scrollX > maxScroll) scrollX = maxScroll;

            eventsEl.style.transform = 'translateX(' + (-scrollX) + 'px)';
            ground.style.backgroundPosition = (-scrollX) + 'px 32px';
            grass.style.backgroundPosition = (-scrollX) + 'px 0';

            if (scrollX < lastScrollX) mario.classList.add('facing-left');
            else if (scrollX > lastScrollX) mario.classList.remove('facing-left');

            if (scrollX !== lastScrollX) {
                mario.classList.remove('idle');
                mario.classList.add('walk');
                const frame = Math.floor(scrollX / 30) % 3;
                mario.style.backgroundPosition = (-frame * 32) + 'px 0';
                clearTimeout(walkTimeout);
                walkTimeout = setTimeout(() => {
                    mario.classList.remove('walk');
                    mario.classList.add('idle');
                    mario.style.backgroundPosition = '-192px 0';
                }, 150);
            }

            let acc = 0;
            timeline.forEach((item, i) => {
                acc += item.spacing + 25;
                const el = document.getElementById('event-' + i);
                const dist = scrollX - acc;

                if (Math.abs(dist) < 50) {
                    el.classList.add('active');
                    triggerAction(item, i, dist);
                } else {
                    el.classList.remove('active');
                    item.triggered = false;
                    if (item.type === 'yoshi') {
                        mario.classList.remove('on-yoshi');
                        const signs = document.getElementById('finale-signs');
                        if (signs) signs.classList.remove('show');
                    }
                }
                acc += 25;
            });
        }

        function triggerAction(item, index, dist) {
            if (item.triggered) return;

            if (item.type === 'block' && Math.abs(dist) < 50) {
                item.triggered = true;
                mario.classList.remove('walk', 'idle');
                mario.classList.add('jumping');
                setTimeout(() => {
                    mario.classList.remove('jumping');
                    mario.classList.add('idle');
                }, 500);
            }
            if (item.type === 'enemy' && Math.abs(dist) < 50) {
                item.triggered = true;
                mario.classList.remove('walk', 'idle', 'jumping');
                mario.classList.add('dead');
                setTimeout(() => {
                    mario.classList.remove('dead');
                    mario.classList.add('idle');
                    mario.style.opacity = '1';
                    mario.style.bottom = '0';
                    mario.style.transform = 'translateX(-50%) scaleX(1)';
                }, 800);
            }
            if (item.type === 'star' && Math.abs(dist) < 50) {
                item.triggered = true;
                mario.classList.add('star-power');
                clearTimeout(starTimeout);
                starTimeout = setTimeout(() => {
                    mario.classList.remove('star-power');
                }, 3000);
            }
            if (item.type === 'peach' && Math.abs(dist) < 50) {
                item.triggered = true;
                const img = document.querySelector('#event-' + index + ' .sprite-peach');
                if (img) img.style.transform = 'translateY(-15px)';
                setTimeout(() => { if (img) img.style.transform = ''; }, 600);
            }
            if (item.type === 'yoshi' && Math.abs(dist) < 10) {
                item.triggered = true;
                mario.classList.add('on-yoshi');
                const signs = document.getElementById('finale-signs');
                if (signs) signs.classList.add('show');
            }
        }

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            updateWorld(e.deltaY * 1.2);
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') updateWorld(80);
            if (e.key === 'ArrowLeft') updateWorld(-80);
        });

        let touchStartX = 0;
        window.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const dx = touchStartX - e.touches[0].clientX;
            touchStartX = e.touches[0].clientX;
            updateWorld(dx * 2);
        }, { passive: false });



        updateWorld(0);
    </script>
</body>

</html>
